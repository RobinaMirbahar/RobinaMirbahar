name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=RobinaMirbahar&show_icons=true&include_all_commits=true&count_private=true&show=reviews,discussions_started,prs_merged,prs_merged_percentage&rank_icon=github&hide_border=true&bg_color=00000000&title_color=2f80ed&text_color=555555&icon_color=586069&hide=contribs&number_format=long&line_height=28&border_radius=12
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=RobinaMirbahar&layout=donut-vertical&langs_count=8&hide_border=true&bg_color=00000000&title_color=2f80ed&text_color=555555&size_weight=0.5&count_weight=0.5&exclude_repo=RobinaMirbahar&hide=html,css&border_radius=12
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate profile details card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: profile-details
          options: username=RobinaMirbahar&theme=transparent&hide_border=true&border_radius=12&text_color=555555&title_color=2f80ed
          path: profile/details.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate repos-per-language card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: repos-per-language
          options: username=RobinaMirbahar&theme=transparent&hide_border=true&border_radius=12&text_color=555555&title_color=2f80ed
          path: profile/repos-lang.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate activity graph
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: activity-graph
          options: username=RobinaMirbahar&theme=react-dark&bg_color=00000000&hide_border=true&area=true&area_color=2f80ed20&custom_title=Robina's%20Contribution%20Graph&point=2f80ed&line=2f80ed&color=555555&height=300&border_radius=12
          path: profile/graph.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
